[book]
src = "src"
title = "Documentation for Mozilla localizers"

[preprocessor.toc]
command = "mdbook-toc"
renderer = ["html"]

[output.html]
git-repository-url = "https://github.com/mozilla-l10n/localizer-documentation/"
edit-url-template = "https://github.com/mozilla-l10n/localizer-documentation/edit/main/{path}"
no-section-label = true

[output.html.redirect]
# Pontoon documentation moved to https://pontoon.mozilla.org/docs/localizer/
"tools/pontoon/index.html" = "https://pontoon.mozilla.org/docs/localizer/"
"tools/pontoon/translate.html" = "https://pontoon.mozilla.org/docs/localizer/translate/"
"tools/pontoon/translation_workspace.html" = "https://pontoon.mozilla.org/docs/localizer/translation-workspace/"
"tools/pontoon/teams_projects.html" = "https://pontoon.mozilla.org/docs/localizer/teams-projects/"
"tools/pontoon/search.html" = "https://pontoon.mozilla.org/docs/localizer/search/"
"tools/pontoon/users.html" = "https://pontoon.mozilla.org/docs/localizer/users/"
"tools/pontoon/notifications.html" = "https://pontoon.mozilla.org/docs/localizer/notifications/"
"tools/pontoon/profile.html" = "https://pontoon.mozilla.org/docs/localizer/profile/"
"tools/pontoon/glossary.html" = "misc/glossary.html"
# Old page names, redirected before the move to pontoon.mozilla.org
"tools/pontoon/search_filters.html" = "https://pontoon.mozilla.org/docs/localizer/translation-workspace/"
"tools/pontoon/ui.html" = "https://pontoon.mozilla.org/docs/localizer/translation-workspace/"
"tools/pontoon/workflow.html" = "https://pontoon.mozilla.org/docs/localizer/translate/"
